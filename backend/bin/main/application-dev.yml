spring:
  datasource:
    url: jdbc:mariadb://database:3306/devdb
    username: dev
    password: dev
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    database-platform: org.hibernate.dialect.MariaDBDialect
    properties:
      hibernate:
        format_sql: true
server:
  port: 8080
