services:
  proxy:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

  backend:
    build: ./backend
    # only accessible to frontend via nginx proxy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mariadb://db:3306/complaints
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-app}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_JPA_SHOW_SQL: "false"
      JAVA_OPTS: "-Xms256m -Xmx512m"
    depends_on:
      db:
        condition: service_healthy
    restart: always

  ingestor:
    build: ./ingestor
    environment:
      NYC_API_BASE_URL: https://data.cityofnewyork.us/resource/erm2-nwe9.json
      NYC_APP_TOKEN: ${NYC_APP_TOKEN:?NYC_APP_TOKEN is required}
      BATCH_SIZE: ${BATCH_SIZE:-1000}
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: complaints
      DB_USER: ${DB_USER:-app}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      REFRESH_INTERVAL_SECONDS: ${REFRESH_INTERVAL_SECONDS:-3600}
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  db:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}
      MARIADB_DATABASE: complaints
      MARIADB_USER: ${DB_USER:-app}
      MARIADB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - prod_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  prod_data:
