stages:
  - lint
  - test

frontend:lint:
  stage: lint
  image: node:22-alpine
  before_script:
    - cd frontend
    - npm ci
  script:
    - npm run lint
    - npm run format:check

frontend:test:
  stage: test
  image: node:22-alpine
  before_script:
    - cd frontend
    - npm ci
  script:
    - npm run test:coverage
  artifacts:
    paths:
      - frontend/coverage/
  coverage: '/All files[^|]*\|\s*([\d.]+)/'

ingestor:lint:
  stage: lint
  image: python:3.12-slim
  before_script:
    - cd ingestor
    - pip install --no-cache-dir black
  script:
    - black --check .

ingestor:test:
  stage: test
  image: python:3.12-slim
  before_script:
    - cd ingestor
    - pip install --no-cache-dir -r requirements.txt
  script:
    - >-
      pytest --cov=.
      --cov-report=term-missing
      --cov-report=html:htmlcov
  artifacts:
    paths:
      - ingestor/htmlcov/
  coverage: '/TOTAL.*\s(\d+%)/'

backend:lint:
  stage: lint
  image: eclipse-temurin:21-jdk-alpine
  before_script:
    - cd backend
    - chmod +x gradlew
  script:
    - ./gradlew checkstyleMain checkstyleTest --no-daemon

backend:test:
  stage: test
  image: eclipse-temurin:21-jdk-alpine
  before_script:
    - cd backend
    - chmod +x gradlew
  script:
    - ./gradlew test jacocoTestReport --no-daemon
    - >-
      awk -F','
      '{ instructions += $4 + $5; covered += $5 }
      END { printf "TOTAL Coverage: %.2f%%\n",
      100 * covered / instructions }'
      build/reports/jacoco/test/jacocoTestReport.csv
  artifacts:
    paths:
      - backend/build/reports/jacoco/
  coverage: '/TOTAL Coverage: ([\d.]+%)/'
